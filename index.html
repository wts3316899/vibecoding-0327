<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>狗狗年齡換算器</title>
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="./icon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 全域樣式 */
    body {
      font-family: "Segoe UI", sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      width: 320px;
      max-width: 100%;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #4CAF50;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #45a049;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
      color: #333;
    }

    .highlight {
      font-size: 22px;
      color: #e91e63;
      margin-top: 10px;
    }

    .error {
      color: red;
      margin-top: 10px;
    }

    .formula {
      margin-top: 15px;
      font-size: 12px;
      color: #777;
    }

    /* 響應式設計：手機/小螢幕 */
    @media (max-width: 480px) {
      body {
        padding: 20px;
      }

      .card {
        padding: 20px;
        border-radius: 12px;
      }

      h1 {
        font-size: 20px;
      }

      input, button {
        padding: 12px;
        font-size: 16px;
      }

      .result {
        font-size: 16px;
      }

      .highlight {
        font-size: 20px;
      }

      .formula {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🐶 狗狗年齡換算器</h1>

    <input type="date" id="birthDate">
    <button onclick="calculateAge()">計算年齡</button>

    <div id="error" class="error"></div>

    <div id="result" class="result" style="display:none;">
      <div>狗狗年齡：<span id="dogAge"></span> 歲</div>
      <div class="highlight">≈ 人類年齡：<span id="humanAge"></span> 歲</div>
    </div>

    <div class="formula">
      使用公式：Human Age = 16 × ln(dog age) + 31
    </div>
  </div>

  <script>
    // 頁面加載時檢查 localStorage 中是否有保存的生日資料
    window.onload = function () {
      const savedBirthDate = localStorage.getItem('birthDate');
      if (savedBirthDate) {
        document.getElementById('birthDate').value = savedBirthDate;
        calculateAge(); // 如果有保存的生日資料，自動計算年齡
      }
    };

    function calculateAge() {
      const input = document.getElementById("birthDate").value;
      const errorDiv = document.getElementById("error");
      const resultDiv = document.getElementById("result");

      errorDiv.innerText = "";
      resultDiv.style.display = "none";

      if (!input) {
        errorDiv.innerText = "請選擇生日";
        return;
      }

      const birthDate = new Date(input);
      const today = new Date();

      if (birthDate > today) {
        errorDiv.innerText = "生日不可為未來日期";
        return;
      }

      // 儲存生日至 localStorage
      localStorage.setItem('birthDate', input);

      // 計算年齡（年）
      const diffTime = today - birthDate;
      const age = diffTime / (1000 * 60 * 60 * 24 * 365.25);

      if (age <= 0 || isNaN(age)) {
        errorDiv.innerText = "請輸入有效日期";
        return;
      }

      // WebMD ln公式
      const humanAge = 16 * Math.log(age) + 31;

      // 顯示結果
      document.getElementById("dogAge").innerText = age.toFixed(1);
      document.getElementById("humanAge").innerText = humanAge.toFixed(1);

      resultDiv.style.display = "block";
    }
  </script>

</body>

</html>
